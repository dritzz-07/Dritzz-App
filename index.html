<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dritzz | Premium Doorstep Car Wash & Detailing in India</title>
    <meta
      name="description"
      content="Dritzz offers premium doorstep car wash, detailing, and monthly cleaning plans for car owners, gated communities, and professionals in Hyderabad and across India."
    />
    <meta
      name="keywords"
      content="doorstep car wash near me, premium car wash India, car detailing Hyderabad, monthly car cleaning subscription, doorstep car detailing, gated community car wash"
    />
    <meta name="author" content="Dritzz" />
    <meta name="robots" content="index, follow" />

    <!-- Performance Optimizations -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://assets.mixkit.co" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Inter:wght@100..900&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Open Graph for Facebook/LinkedIn -->
    <meta
      property="og:title"
      content="Dritzz | Premium Doorstep Car Wash & Detailing"
    />
    <meta
      property="og:description"
      content="Experience premium luxury car care at your doorstep. Subscribe to monthly cleaning plans or book on-demand detailing."
    />
    <meta property="og:image" content="https://dritzz.com/porsche-dritzz.jpg" />
    <meta property="og:url" content="https://dritzz.com" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dritzz | Premium Doorstep Car Wash" />
    <meta
      name="twitter:description"
      content="Premium mobile car detailing & washing in India."
    />
    <meta
      name="twitter:image"
      content="https://dritzz.com/porsche-dritzz.jpg"
    />

    <link rel="canonical" href="https://dritzz.com" />

    <!-- JSON-LD Schema Markup -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "Dritzz",
        "image": "https://dritzz.com/logo.svg",
        "url": "https://dritzz.com",
        "telephone": "+91-9859574745",
        "priceRange": "₹₹",
        "description": "Premium doorstep car wash & detailing services in Hyderabad, India. Book daily car wash, monthly car cleaning subscriptions and premium auto detailing.",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Hyderabad",
          "addressRegion": "Telangana",
          "addressCountry": "IN"
        },
        "areaServed": "Hyderabad",
        "serviceArea": {
          "@type": "GeoCircle",
          "geoMidpoint": {
            "@type": "GeoCoordinates",
            "latitude": "17.3850",
            "longitude": "78.4867"
          },
          "geoRadius": "50000"
        },
        "potentialAction": {
          "@type": "ReserveAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://dritzz.com/#booking",
            "inLanguage": "en-US",
            "actionPlatform": [
              "http://schema.org/DesktopWebPlatform",
              "http://schema.org/MobileWebPlatform"
            ]
          },
          "result": {
            "@type": "Reservation",
            "name": "Book Car Wash"
          }
        }
      }
    </script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
